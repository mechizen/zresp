# ② 公開オリジン + Cloudflare Origin CA (Full strict) 用のリバースプロキシ設定。
# TLS をここで終端し、背後の zresp(app:8000) へは HTTP でプロキシする。
# 証明書は ../certs/ を /etc/ssl/cloudflare にマウントして渡す (docker-compose 参照)。

server {
    listen 443 ssl;
    http2 on;
    server_name _;  # テスト用オリジンのため任意ホストを受け付ける (実ホストは CF が付与)

    # ── ② Cloudflare Origin CA で発行した証明書と秘密鍵 ──
    ssl_certificate     /etc/ssl/cloudflare/origin.pem;
    ssl_certificate_key /etc/ssl/cloudflare/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── ⑤ Authenticated Origin Pulls (任意・推奨) ──
    # Cloudflare が提示するクライアント証明書を検証し、CF 以外からの接続を弾く。
    # 有効化するには certs/authenticated_origin_pull_ca.pem を配置し、次の2行のコメントを外す。
    #ssl_client_certificate /etc/ssl/cloudflare/authenticated_origin_pull_ca.pem;
    #ssl_verify_client      on;

    location / {
        proxy_pass         http://app:8000;   # ← zresp 本体は HTTP のまま
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # 実クライアント IP は CF-Connecting-IP として素通しされる (zresp が解決)
    }
}

# 任意: 平文 80 で来た場合は 443 へ誘導 (CF は通常 443 で接続する)
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
