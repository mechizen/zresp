services:
  app:
    build: .
    image: zresp:latest
    ports:
      - "8000:8000"
    environment:
      - ZRESP_APP_NAME=zresp
    restart: unless-stopped

  # Cloudflare Tunnel 経由で公開する場合に使用 (profile: tunnel)。
  #   1. Cloudflare ダッシュボードで named tunnel を作成しトークンを取得
  #   2. .env に TUNNEL_TOKEN を設定
  #   3. 公開ホスト名を http://app:8000 にルーティング
  #   4. docker compose --profile tunnel up
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - app
    restart: unless-stopped

  # ② 公開オリジン + Cloudflare Origin CA (Full strict) 構成 (profile: tls-origin)。
  # nginx が 443 で TLS を終端し、背後の app(HTTP) へプロキシする。
  #   1. CF で Origin CA 証明書を発行し certs/ に配置:
  #        certs/origin.pem / certs/origin.key
  #        (任意) certs/authenticated_origin_pull_ca.pem  ← AOP 用
  #   2. DNS をプロキシ(オレンジ)に、SSL/TLS モードを Full (strict) に設定
  #   3. docker compose --profile tls-origin up --build
  proxy:
    image: nginx:alpine
    profiles: ["tls-origin"]
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl/cloudflare:ro
    depends_on:
      - app
    restart: unless-stopped
